services:
  # Next.js CRM application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiyim-crm-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    networks:
      - crm-network

  # Nginx reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: kiyim-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge
