worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Upstream pointing to the Next.js application container(s).
    # Add more "server" lines here to load balance across replicas.
    upstream nextjs_app {
        least_conn;
        server web:3000;
        # server web2:3000;
        # server web3:3000;
    }

    # Basic proxy + gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    sendfile on;

    # Server block to listen on port 80 and proxy requests to the Next.js app
    server {
        listen 80;

        location / {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}