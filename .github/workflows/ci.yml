name: Next.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Kodni GitHub runner-ga yuklash
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. pnpm paket menejerini o'rnatish (Xatolikni tuzatuvchi asosiy qadam)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # yoki loyihangizga mos keladigan pnpm versiyasi

      # 3. Node.js muhitini sozlash (pnpm keshini hisobga olgan holda)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11+ versiyalari uchun Node 22 tavsiya etiladi
          cache: 'pnpm'

      # 4. Kutubxonalarni pnpm orqali o'rnatish
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Loyihani build qilib ko'rish
      - name: Build Next.js application
        run: pnpm build