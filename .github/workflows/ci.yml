name: Next.js CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub-dagi kodni tekshirish muhitiga yuklab olish
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js muhitini sozlash
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # yoki loyihangiz mos keladigan node versiyasi
          cache: 'npm'

      # 3. Kutubxonalarni o'rnatish (npm install)
      - name: Install dependencies
        run: npm ci

      # 4. Kodni xatolarga tekshirish (Linter)
      - name: Run Linter
        run: npm run lint --if-present

      # 5. Loyihani build qilib ko'rish (Siz boya terminalda qilgan narsa)
      - name: Build Next.js application
        run: npm run build